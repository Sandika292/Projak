name: Build Flutter APK

on:
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Build type'
        required: true
        default: 'release'
        type: choice
        options: [release, debug]
      chat_id:
        description: 'Telegram chat ID'
        required: false

jobs:
  build-apk:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Extract project ZIP
        run: |
          unzip -q project.zip -d proj_tmp
          # Masuk satu level jika ada folder wrapper
          if [ \$(find proj_tmp -maxdepth 1 -mindepth 1 -type d | wc -l) -eq 1 ]; then
            mv proj_tmp/*/  ./ 2>/dev/null || true
            mv proj_tmp/* . 2>/dev/null || true
          else
            mv proj_tmp/* . 2>/dev/null || true
          fi
          rm -rf proj_tmp project.zip

      - uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.32.1'
          channel: stable
          cache: true

      - run: flutter pub get

      - name: Generate icons (optional)
        run: dart run flutter_launcher_icons || echo "Skipped: flutter_launcher_icons not found"

      - name: Build APK
        run: |
          TYPE="${{ github.event.inputs.build_type }}"
          if [ "$TYPE" = "debug" ]; then
            flutter build apk --debug --no-shrink
          else
            flutter build apk --release --no-shrink
          fi

      - name: Rename & package
        run: |
          TYPE="${{ github.event.inputs.build_type }}"
          DATE=$(date +'%Y%m%d_%H%M')
          mkdir -p output
          if [ "$TYPE" = "debug" ]; then
            cp build/app/outputs/flutter-apk/app-debug.apk output/app_debug_${DATE}.apk
          else
            cp build/app/outputs/flutter-apk/app-release.apk output/app_release_${DATE}.apk
          fi

      - uses: actions/upload-artifact@v4
        with:
          name: flutter-apk-${{ github.event.inputs.build_type }}-${{ github.run_number }}
          path: output/*.apk
          retention-days: 1
