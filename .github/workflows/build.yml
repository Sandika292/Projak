name: Build Base APK

on:
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Build type (release/debug)'
        required: false
        default: 'release'
        type: choice
        options:
          - release
          - debug

jobs:
  build-apk:
    name: Build Flutter APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.32.1'
          channel: 'stable'
          cache: true

      - name: Setup Android NDK
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r27

      - name: Get Flutter packages
        run: flutter pub get

      - name: Generate launcher icons
        run: dart run flutter_launcher_icons

      - name: Build APK
        run: |
          if [ "${{ github.event.inputs.build_type }}" = "debug" ]; then
            flutter build apk --debug --no-shrink
          else
            flutter build apk --release --no-shrink
          fi

      - name: Rename APK
        run: |
          BUILD_TYPE="${{ github.event.inputs.build_type }}"
          DATE=$(date +'%Y%m%d_%H%M')
          mkdir -p output
          if [ "$BUILD_TYPE" = "debug" ]; then
            cp build/app/outputs/flutter-apk/app-debug.apk output/astral_${BUILD_TYPE}_${DATE}.apk
          else
            cp build/app/outputs/flutter-apk/app-release.apk output/astral_${BUILD_TYPE}_${DATE}.apk
          fi

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: astral-apk-${{ github.event.inputs.build_type }}-${{ github.run_number }}
          path: output/*.apk
          retention-days: 30
